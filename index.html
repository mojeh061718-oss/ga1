<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#dce8f0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Calm Pups">
  <title>Calm Pups</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ============ RESCUE LOGIN ============ -->
  <section id="screen-login" class="screen active">
    <div id="login-corner-skip" aria-hidden="true"></div>

    <div id="login-scan" class="login-step active">
      <div id="shield-wrap">
        <svg id="shield" viewBox="0 0 200 220" aria-label="rescue badge">
          <!-- progress ring -->
          <circle id="scan-ring-track" cx="100" cy="110" r="96" fill="none"
                  stroke="#f6d7e4" stroke-width="6" opacity="0.5"/>
          <circle id="scan-ring" cx="100" cy="110" r="96" fill="none"
                  stroke="#ef8bb5" stroke-width="6" stroke-linecap="round"
                  stroke-dasharray="603.2" stroke-dashoffset="603.2"
                  transform="rotate(-90 100 110)"/>
          <!-- original shield: rounded badge with paw + star (not any TV show's badge) -->
          <path id="shield-body" d="M100 22
                   C 128 34, 152 38, 168 38
                   C 168 108, 158 160, 100 196
                   C 42 160, 32 108, 32 38
                   C 48 38, 72 34, 100 22 Z"
                fill="#f2a7c6" stroke="#e386ad" stroke-width="4"/>
          <path d="M100 34 C 124 44, 144 48, 156 48 C 156 106, 148 150, 100 182
                   C 52 150, 44 106, 44 48 C 56 48, 76 44, 100 34 Z"
                fill="#f7c2d8"/>
          <!-- paw print -->
          <g fill="#ffffff">
            <ellipse cx="100" cy="122" rx="24" ry="20"/>
            <ellipse cx="72" cy="98" rx="9" ry="12" transform="rotate(-20 72 98)"/>
            <ellipse cx="90" cy="88" rx="9" ry="12" transform="rotate(-7 90 88)"/>
            <ellipse cx="110" cy="88" rx="9" ry="12" transform="rotate(7 110 88)"/>
            <ellipse cx="128" cy="98" rx="9" ry="12" transform="rotate(20 128 98)"/>
          </g>
          <!-- star -->
          <path d="M100 148 l4.7 9.5 10.5 1.5 -7.6 7.4 1.8 10.4 -9.4 -4.9 -9.4 4.9 1.8 -10.4 -7.6 -7.4 10.5 -1.5 Z"
                fill="#f9e6a8" stroke="#eccf7f" stroke-width="1.5" transform="translate(0,8)"/>
          <!-- scan line -->
          <rect id="scan-line" x="36" y="30" width="128" height="5" rx="2.5"
                fill="#ffffff" opacity="0"/>
        </svg>
        <div id="scan-sparkles" aria-hidden="true"></div>
      </div>
    </div>

    <div id="login-name" class="login-step">
      <img id="login-pup" class="pup" alt="pup">
      <div id="name-mic" aria-hidden="true">
        <svg viewBox="0 0 60 60">
          <circle class="name-mic-pulse" cx="30" cy="30" r="26" fill="none" stroke="#a8bfd4" stroke-width="2"/>
          <rect x="23" y="12" width="14" height="24" rx="7" fill="#7d97b0"/>
          <path d="M18 32 a12 12 0 0 0 24 0" fill="none" stroke="#7d97b0" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="44" x2="30" y2="50" stroke="#7d97b0" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <button id="login-paw-btn" class="hidden" aria-label="enter">
      <svg viewBox="0 0 100 100">
        <g fill="#ffffff">
          <ellipse cx="50" cy="62" rx="22" ry="18"/>
          <ellipse cx="26" cy="40" rx="8.5" ry="11" transform="rotate(-20 26 40)"/>
          <ellipse cx="42" cy="31" rx="8.5" ry="11" transform="rotate(-7 42 31)"/>
          <ellipse cx="60" cy="31" rx="8.5" ry="11" transform="rotate(7 60 31)"/>
          <ellipse cx="75" cy="40" rx="8.5" ry="11" transform="rotate(20 75 40)"/>
        </g>
      </svg>
    </button>
  </section>

  <!-- ============ HOME ============ -->
  <section id="screen-home" class="screen">
    <div class="home-cards">
      <button class="card" id="card-balloon" data-screen="balloon" aria-label="balloon game">
        <img class="pup card-pup" data-pup="balloon" alt="">
        <svg class="card-icon" viewBox="0 0 80 100" aria-hidden="true">
          <path d="M40 8 C 58 8, 68 22, 68 40 C 68 58, 54 72, 40 72 C 26 72, 12 58, 12 40 C 12 22, 22 8, 40 8 Z" fill="#f2a7c6"/>
          <path d="M37 72 l3 7 l3 -7 Z" fill="#e386ad"/>
          <path d="M40 79 C 36 86, 44 92, 40 98" fill="none" stroke="#9fb6c9" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="30" cy="28" rx="7" ry="11" fill="#ffffff" opacity="0.5" transform="rotate(-20 30 28)"/>
        </svg>
      </button>
      <button class="card" id="card-breathing" data-screen="breathing" aria-label="breathing game">
        <img class="pup card-pup" data-pup="breathing" alt="">
        <svg class="card-icon" viewBox="0 0 80 100" aria-hidden="true">
          <circle cx="40" cy="50" r="16" fill="#c3b6dd"/>
          <circle cx="40" cy="50" r="24" fill="none" stroke="#c3b6dd" stroke-width="2.5" opacity="0.6"/>
          <circle cx="40" cy="50" r="32" fill="none" stroke="#c3b6dd" stroke-width="2" opacity="0.3"/>
        </svg>
      </button>
      <button class="card" id="card-glitter" data-screen="glitter" aria-label="glitter jar">
        <img class="pup card-pup" data-pup="glitter" alt="">
        <svg class="card-icon" viewBox="0 0 80 100" aria-hidden="true">
          <rect x="26" y="14" width="28" height="10" rx="3" fill="#9fb6c9"/>
          <path d="M22 26 h36 v54 a8 8 0 0 1 -8 8 h-20 a8 8 0 0 1 -8 -8 Z" fill="#dff0f4" stroke="#b3ccd6" stroke-width="2.5"/>
          <circle cx="34" cy="46" r="2.6" fill="#8fc7bd"/>
          <circle cx="47" cy="56" r="2.2" fill="#c3b6dd"/>
          <circle cx="38" cy="66" r="2.8" fill="#f2a7c6"/>
          <circle cx="49" cy="40" r="2.0" fill="#f2a7c6"/>
          <circle cx="30" cy="74" r="2.2" fill="#c3b6dd"/>
          <circle cx="44" cy="76" r="2.4" fill="#8fc7bd"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- ============ BALLOON ============ -->
  <section id="screen-balloon" class="screen">
    <button class="home-btn" aria-label="home">
      <svg viewBox="0 0 40 40"><path d="M6 20 L20 7 L34 20 M11 18 v14 h18 v-14" fill="none" stroke="#7d97b0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="balloon-mic-btn" aria-label="microphone">
      <svg viewBox="0 0 40 40">
        <rect x="15" y="6" width="10" height="17" rx="5" fill="currentColor"/>
        <path d="M11 20 a9 9 0 0 0 18 0" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="29" x2="20" y2="34" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line class="mic-slash" x1="8" y1="8" x2="32" y2="32" stroke="#d68a8a" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="balloon-stage">
      <div id="balloon-holder">
        <svg id="balloon-svg" viewBox="0 0 120 190" aria-hidden="true">
          <g id="balloon-g">
            <path id="balloon-body" d="M60 6 C 92 6, 110 32, 110 62 C 110 94, 84 118, 60 118 C 36 118, 10 94, 10 62 C 10 32, 28 6, 60 6 Z" fill="#f2a7c6"/>
            <path id="balloon-knot" d="M55 118 l5 10 l5 -10 Z" fill="#e386ad"/>
            <ellipse cx="42" cy="40" rx="12" ry="19" fill="#ffffff" opacity="0.45" transform="rotate(-20 42 40)"/>
          </g>
          <path id="balloon-string" d="M60 129 C 52 148, 68 165, 60 186" fill="none" stroke="#9fb6c9" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div id="balloon-sparkles" aria-hidden="true"></div>
      <img id="balloon-pup" class="pup" data-pup="balloon" alt="pup">
    </div>
  </section>

  <!-- ============ BREATHING ============ -->
  <section id="screen-breathing" class="screen">
    <button class="home-btn" aria-label="home">
      <svg viewBox="0 0 40 40"><path d="M6 20 L20 7 L34 20 M11 18 v14 h18 v-14" fill="none" stroke="#7d97b0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div id="breath-stage">
      <div id="breath-halo"></div>
      <div id="breath-orb">
        <img id="breath-pup" class="pup" data-pup="breathing" alt="pup">
      </div>
    </div>
  </section>

  <!-- ============ GLITTER ============ -->
  <section id="screen-glitter" class="screen">
    <button class="home-btn" aria-label="home">
      <svg viewBox="0 0 40 40"><path d="M6 20 L20 7 L34 20 M11 18 v14 h18 v-14" fill="none" stroke="#7d97b0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <img id="glitter-pup" class="pup" data-pup="glitter" alt="pup">
    <canvas id="glitter-canvas"></canvas>
  </section>

  <script src="js/pups.js" defer></script>
  <script src="js/sounds.js" defer></script>
  <script src="js/mic.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/login.js" defer></script>
  <script src="js/balloon.js" defer></script>
  <script src="js/breathing.js" defer></script>
  <script src="js/glitter.js" defer></script>
</body>
</html>
