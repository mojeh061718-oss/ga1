<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Original character: "Berry" the balloon pup (golden, blue collar) -->
  <!-- body -->
  <ellipse cx="100" cy="176" rx="52" ry="38" fill="#e8c48f"/>
  <ellipse cx="100" cy="186" rx="34" ry="24" fill="#f6e3c4"/>
  <!-- front paws -->
  <ellipse cx="74" cy="206" rx="15" ry="10" fill="#e8c48f"/>
  <ellipse cx="126" cy="206" rx="15" ry="10" fill="#e8c48f"/>
  <!-- head -->
  <circle cx="100" cy="92" r="62" fill="#e8c48f"/>
  <!-- floppy ears -->
  <path d="M46 58 C 26 66, 22 102, 36 122 C 50 118, 58 96, 56 72 Z" fill="#c99e63"/>
  <path d="M154 58 C 174 66, 178 102, 164 122 C 150 118, 142 96, 144 72 Z" fill="#c99e63"/>
  <!-- muzzle -->
  <ellipse cx="100" cy="116" rx="30" ry="22" fill="#f6e3c4"/>
  <!-- eyes -->
  <circle cx="76" cy="86" r="9" fill="#4a3b2f"/>
  <circle cx="124" cy="86" r="9" fill="#4a3b2f"/>
  <circle cx="79" cy="83" r="3" fill="#ffffff"/>
  <circle cx="127" cy="83" r="3" fill="#ffffff"/>
  <!-- nose + mouth -->
  <ellipse cx="100" cy="108" rx="9" ry="7" fill="#4a3b2f"/>
  <path d="M100 115 q 0 8 -9 9 M100 115 q 0 8 9 9" fill="none" stroke="#4a3b2f" stroke-width="3" stroke-linecap="round"/>
  <!-- happy brows -->
  <path d="M66 68 q 10 -7 20 -2 M114 66 q 10 -5 20 2" fill="none" stroke="#c99e63" stroke-width="4" stroke-linecap="round"/>
  <!-- collar with star tag -->
  <path d="M52 146 q 48 22 96 0 l 0 14 q -48 22 -96 0 Z" fill="#7fa8d9"/>
  <path d="M100 162 l4 8 8.6 1.2 -6.2 6.1 1.5 8.6 -7.9 -4.1 -7.9 4.1 1.5 -8.6 -6.2 -6.1 8.6 -1.2 Z" fill="#f9e6a8" stroke="#eccf7f" stroke-width="1.5"/>
</svg>
