<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Original character: "Willow" the breathing pup (grey, lavender collar, sleepy-calm eyes) -->
  <!-- body -->
  <ellipse cx="100" cy="176" rx="52" ry="38" fill="#cfd4dd"/>
  <ellipse cx="100" cy="186" rx="34" ry="24" fill="#eef0f4"/>
  <!-- front paws -->
  <ellipse cx="74" cy="206" rx="15" ry="10" fill="#cfd4dd"/>
  <ellipse cx="126" cy="206" rx="15" ry="10" fill="#cfd4dd"/>
  <!-- head -->
  <circle cx="100" cy="92" r="62" fill="#cfd4dd"/>
  <!-- perky soft ears -->
  <path d="M52 52 C 40 30, 62 22, 72 40 C 76 50, 70 62, 60 66 Z" fill="#aab1bf"/>
  <path d="M148 52 C 160 30, 138 22, 128 40 C 124 50, 130 62, 140 66 Z" fill="#aab1bf"/>
  <!-- muzzle -->
  <ellipse cx="100" cy="116" rx="30" ry="22" fill="#eef0f4"/>
  <!-- calm closed-happy eyes -->
  <path d="M66 88 q 10 -10 20 0" fill="none" stroke="#4a4a55" stroke-width="5" stroke-linecap="round"/>
  <path d="M114 88 q 10 -10 20 0" fill="none" stroke="#4a4a55" stroke-width="5" stroke-linecap="round"/>
  <!-- nose + gentle smile -->
  <ellipse cx="100" cy="108" rx="9" ry="7" fill="#4a4a55"/>
  <path d="M100 115 q 0 8 -9 9 M100 115 q 0 8 9 9" fill="none" stroke="#4a4a55" stroke-width="3" stroke-linecap="round"/>
  <!-- blush -->
  <ellipse cx="62" cy="106" rx="8" ry="5" fill="#e8c7d3" opacity="0.7"/>
  <ellipse cx="138" cy="106" rx="8" ry="5" fill="#e8c7d3" opacity="0.7"/>
  <!-- collar with star tag -->
  <path d="M52 146 q 48 22 96 0 l 0 14 q -48 22 -96 0 Z" fill="#c3b6dd"/>
  <path d="M100 162 l4 8 8.6 1.2 -6.2 6.1 1.5 8.6 -7.9 -4.1 -7.9 4.1 1.5 -8.6 -6.2 -6.1 8.6 -1.2 Z" fill="#f9e6a8" stroke="#eccf7f" stroke-width="1.5"/>
</svg>
